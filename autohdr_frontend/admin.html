<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - AutoHDR</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="admin-app" class="container">
    <header>
      <h1>Admin<span class="version">KEY</span></h1>
      <a href="https://www.facebook.com/nguyennef.ndn">by tuitenPhở</a>
    </header>

    <div class="split-layout">
      <!-- Cột bên trái: Form tạo Key -->
      <div class="split-left">
        <div class="card">
          <h3>Tạo License Key</h3>
          <form id="key-form">
            <div class="form-group">
              <label for="admin-pass">Mật khẩu</label>
              <input type="password" id="admin-pass" placeholder="Nhập mật khẩu..." required />
            </div>

            <div class="form-divider">Chi tiết Key</div>

            <div class="form-group">
              <label for="key-name">Tên</label>
              <input type="text" id="key-name" placeholder="Ví dụ: Nguyen_Vancouver" required />
            </div>

            <div class="form-group">
              <label>Thời hạn sử dụng</label>
              <div style="display: flex; gap: 1.5rem; margin-top: 0.5rem; align-items: center;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                  <input type="radio" name="expiry" value="days" checked>
                  <input type="number" id="expiry-days-input" value="30" min="1" max="9999"
                    style="width: 70px; padding: 0.3rem;" /> Ngày
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                  <input type="radio" name="expiry" value="forever"> Vĩnh viễn
                </label>
              </div>
            </div>

            <button type="submit" id="btn-create" class="btn-primary">Tạo</button>
          </form>

          <div id="new-key-result"
            style="display: none; margin-top: 1.5rem; padding: 1rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px;">
            <p style="color: #166534; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem;">Key đã được tạo thành
              công:</p>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <code id="display-key"
                style="flex: 1; background: #fff; padding: 0.5rem; border-radius: 4px; border: 1px solid #bbf7d0; font-family: monospace; font-weight: 700; font-size: 1.1rem; color: #15803d;"></code>
              <button id="btn-copy" class="btn-clear" style="padding: 0.6rem;">Copy</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Cột bên phải: Danh sách Key -->
      <div class="split-right">
        <div class="card">
          <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 0.5rem;">
            <h3>Danh sách Keys</h3>
            <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
              <button id="btn-export" class="btn-clear"
                style="padding: 0.4rem 0.8rem; border: 1px solid var(--border);">Export JSON</button>
              <label for="import-file" class="btn-clear"
                style="cursor: pointer; padding: 0.4rem 0.8rem; border: 1px solid var(--border); margin: 0;">Import
                JSON</label>
              <input type="file" id="import-file" accept=".json" style="display: none;" />
              <button id="btn-list" class="btn-primary" style="padding: 0.4rem 0.8rem;">Làm mới</button>
            </div>
          </div>

          <div id="keys-table-container" style="overflow-x: auto;">
            <table id="keys-table" style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
              <thead>
                <tr style="text-align: left; border-bottom: 2px solid var(--border);">
                  <th style="padding: 0.5rem;">Tên</th>
                  <th style="padding: 0.5rem;">Key</th>
                  <th style="padding: 0.5rem;">Hạn dùng</th>
                  <th style="padding: 0.5rem;">Máy khóa</th>
                  <th style="padding: 0.5rem; text-align: center;">Hành động</th>
                </tr>
              </thead>
              <tbody id="keys-body">
                <!-- Dữ liệu sẽ được chèn vào đây -->
                <tr>
                  <td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-light);">
                    Nhập mật khẩu bên trái và bấm "Làm mới" để xem danh sách.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/admin.js"></script>
</body>

</html>
