<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - AutoHDR</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="admin-app" class="container">
    <header>
      <h1>Admin Management <span class="version">KEY</span></h1>
      <p>Quản lý license keys và cấp quyền truy cập ứng dụng Desktop</p>
    </header>

    <div class="split-layout">
      <!-- Cột bên trái: Form tạo Key -->
      <div class="split-left">
        <div class="card">
          <h3>Tạo License Key Mới</h3>
          <form id="key-form">
            <div class="form-group">
              <label for="admin-pass">Mật khẩu Admin (Proxy Pass)</label>
              <input type="password" id="admin-pass" placeholder="Nhập mật khẩu để thực hiện..." required />
            </div>
            
            <div class="form-divider">Chi tiết Key</div>

            <div class="form-group">
              <label for="key-name">Tên khách hàng / Ghi chú</label>
              <input type="text" id="key-name" placeholder="Ví dụ: Nguyen_Vancouver" required />
            </div>

            <div class="form-group">
              <label>Thời hạn sử dụng</label>
              <div style="display: flex; gap: 1.5rem; margin-top: 0.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                  <input type="radio" name="expiry" value="30" checked> 30 Ngày
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                  <input type="radio" name="expiry" value="forever"> Vĩnh viễn
                </label>
              </div>
            </div>

            <button type="submit" id="btn-create" class="btn-primary">Tạo License Key</button>
          </form>

          <div id="new-key-result" style="display: none; margin-top: 1.5rem; padding: 1rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px;">
            <p style="color: #166534; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem;">Key đã được tạo thành công:</p>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <code id="display-key" style="flex: 1; background: #fff; padding: 0.5rem; border-radius: 4px; border: 1px solid #bbf7d0; font-family: monospace; font-weight: 700; font-size: 1.1rem; color: #15803d;"></code>
              <button id="btn-copy" class="btn-clear" style="padding: 0.6rem;">Copy</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Cột bên phải: Danh sách Key -->
      <div class="split-right">
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>Danh sách Keys hiện có</h3>
            <button id="btn-list" class="btn-clear">Làm mới danh sách</button>
          </div>
          
          <div id="keys-table-container" style="overflow-x: auto;">
             <table id="keys-table" style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
               <thead>
                 <tr style="text-align: left; border-bottom: 2px solid var(--border);">
                   <th style="padding: 0.5rem;">Tên / Ghi chú</th>
                   <th style="padding: 0.5rem;">Key</th>
                   <th style="padding: 0.5rem;">Hạn dùng</th>
                   <th style="padding: 0.5rem;">Máy khóa</th>
                 </tr>
               </thead>
               <tbody id="keys-body">
                 <!-- Dữ liệu sẽ được chèn vào đây -->
                 <tr>
                   <td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-light);">
                     Nhập mật khẩu bên trái và bấm "Làm mới" để xem danh sách.
                   </td>
                 </tr>
               </tbody>
             </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/admin.js"></script>
</body>

</html>
