# Backend CI - Test and Prepare for Railway Auto-deploy
name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'autohdr_backend/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: autohdr_backend/requirements.txt

      - name: Install dependencies
        working-directory: autohdr_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: autohdr_backend
        run: python -m pytest tests/ -v --tb=short
